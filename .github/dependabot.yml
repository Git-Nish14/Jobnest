# Dependabot keeps npm packages and GitHub Actions up to date automatically.
# Weekly PRs on Mondays; grouped to reduce noise.

version: 2

updates:
  # ── npm (web/) ─────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    # Group all non-major updates into a single PR to reduce noise.
    groups:
      dependencies:
        update-types:
          - minor
          - patch
    # Open separate PRs for major version bumps (breaking changes).
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    groups:
      actions:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
      - automated
    commit-message:
      prefix: "chore(ci)"
