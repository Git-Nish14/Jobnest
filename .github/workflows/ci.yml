name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: web

jobs:
  # ── Type-check ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx eslint . --max-warnings 0

  # ── Unit + Integration tests (Vitest) ─────────────────────────────────────
  test:
    name: Vitest (unit + flows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: web/coverage/
          retention-days: 7

  # ── Coverage gate (70% threshold) ─────────────────────────────────────────
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Run coverage with threshold
        run: npm run test:coverage
        # Vitest will exit non-zero if thresholds (70% stmt/fn/line, 65% branch) are not met

  # ── Playwright E2E (runs only when PLAYWRIGHT_BASE_URL secret is set) ─────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Only run E2E when a staging URL is available — skip on forks
    if: ${{ vars.PLAYWRIGHT_BASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [typecheck, test, coverage]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: https://jobnest.nishpatel.dev
      NEXT_PUBLIC_APP_URL: https://jobnest.nishpatel.dev
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      GROQ_API_KEY: placeholder-groq-key
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_USER: ci@example.com
      SMTP_PASS: placeholder
      CONTACT_EMAIL: contact@example.com
      CRON_SECRET: placeholder-cron-secret
      CSRF_SECRET: placeholder-csrf-secret-that-is-long-enough-32ch
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_PRO_PRICE_ID: price_placeholder
      STRIPE_PRO_ANNUAL_PRICE_ID: price_annual_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
