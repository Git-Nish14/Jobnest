name: Secrets Scan

# Runs on every push and pull request to main.
# Blocks the PR if truffleHog finds any high-entropy secrets or known credential
# patterns committed anywhere in the diff (or full repo on push to main).

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  trufflehog:
    name: TruffleHog — Secret Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history lets truffleHog scan all commits, not just the tip.
          fetch-depth: 0

      - name: Run TruffleHog OSS
        # Pinned to a specific release tag — avoids supply-chain risk from @main.
        # Update this tag when a new trufflehog release ships (Dependabot handles it).
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          # fail: true makes the action exit non-zero when secrets are found.
          # Do NOT also pass --fail in extra_args — the action injects it
          # internally and the flag parser rejects duplicates (exit 1).
          fail: true
          # --only-verified is intentionally omitted: it would miss real secrets
          # that are revoked/internal and therefore unverifiable by trufflehog.
